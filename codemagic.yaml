workflows:
  android-workflow:
    name: Android Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build and Force Export APK
        script: |
          #!/bin/sh

          # 1. بناء التطبيق النهائي مع معالجة الأيقونات ومعمارية arm64
          flutter build apk --release --target-platform android-arm64 --no-tree-shake-icons || true

          # 2. تحديد مجلد التصدير المضمون (يدعم المتغير القديم والجديد للسيرفر)
          EXPORT_DIR=${CM_EXPORT_DIR:-$FCI_EXPORT_DIR}

          echo "--- Searching for ST_Manager APK ---"
          
          # 3. فكرتك الذكية: البحث الشامل ونقل الملف فوراً إلى مجلد التصدير
          find . -name "*.apk" -exec cp {} $EXPORT_DIR/ST_Manager.apk \; || true

          # 4. التأكيد النهائي في السجل المباشر أمامك
          if [ -f $EXPORT_DIR/ST_Manager.apk ]; then
            echo "✅ ST_Manager.apk is READY in Artifacts!"
            ls -lh $EXPORT_DIR/ST_Manager.apk
          else
            echo "❌ File not found yet, checking deeper..."
            find build -name "*.apk" -exec cp {} $EXPORT_DIR/ST_Manager.apk \; || true
          fi
    artifacts:
      # إجبار المنصة على مراقبة مجلد التصدير السحابي واقتناص الملف فوراً لخانة التحميل
      - $CM_EXPORT_DIR/*.apk
      - $FCI_EXPORT_DIR/*.apk
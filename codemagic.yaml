workflows:
  android-workflow:
    name: Android Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build and Force Export APK
        script: |
          #!/bin/sh
          
          # 1. بناء التطبيق للنسخة النهائية المستقرة مع معمارية arm64 المشهورة للهواتف
          flutter build apk --release --target-platform android-arm64 --no-tree-shake-icons || true

          # 2. تحديد مجلد التصدير المضمون في كود ماجيك (يدعم الاسمين القديم والحديث للمتغير)
          EXPORT_DIR=${CM_EXPORT_DIR:-$FCI_EXPORT_DIR}
          
          echo "--- Searching for ST_Manager APK ---"
          
          # 3. فكرتك الذكية: البحث الشامل ونقل الملف فوراً إلى مجلد التصدير باسم واضح لشبكتك
          find build -name "*.apk" -exec cp {} $EXPORT_DIR/Sultan_Net.apk \; || true
          find . -name "*.apk" -exec cp {} $EXPORT_DIR/Sultan_Net.apk \; || true

          # 4. التأكيد النهائي وطباعة النتيجة في السجل أمامك
          if [ -f $EXPORT_DIR/Sultan_Net.apk ]; then
            echo "✅ Sultan_Net.apk is READY in Artifacts!"
            ls -lh $EXPORT_DIR/Sultan_Net.apk
          else
            echo "❌ File not found, making a last desperate search..."
            find / -name "*release.apk" -exec cp {} $EXPORT_DIR/Sultan_Net.apk \; 2>/dev/null || true
          fi
    artifacts:
      # إجبار المنصة على مراقبة مجلد التصدير السريع واقتناص الملف فوراً
      - $CM_EXPORT_DIR/*.apk
      - $FCI_EXPORT_DIR/*.apk
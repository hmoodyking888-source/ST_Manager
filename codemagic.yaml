workflows:
  android-workflow:
    name: Android Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Clean and Get Packages
        script: |
          flutter clean
          flutter pub get
      - name: Build and Hijack Default Path
        script: |
          #!/bin/sh
          # 1. بناء التطبيق لنسخة الـ Release الكاملة
          flutter build apk --release --no-tree-shake-icons || true

          echo "--- Hijacking Default Gradle Path ---"
          
          # 2. إنشاء المجلد الافتراضي الأصلي للتأكيد (في حال لم يصنعه الـ Gradle بسبب التحذيرات)
          mkdir -p build/app/outputs/flutter-apk

          # 3. فكرتك العبقرية: البحث عن الـ APK الحقيقي ونقله للمسار الافتراضي بالاسم الذي يبحث عنه الموقع
          find build -name "*.apk" -exec cp {} build/app/outputs/flutter-apk/app-release.apk \; || true
          find . -name "*.apk" -exec cp {} build/app/outputs/flutter-apk/app-release.apk \; || true

          # 4. تأكيد النجاح داخل السجل ليطمئن قلبك قبل انتهاء الخطوة
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            echo "✅ Perfect! Genuine APK is now placed in the default path."
            ls -lh build/app/outputs/flutter-apk/app-release.apk
          else
            echo "❌ File still missing"
          fi
    artifacts:
      # ترك المسار الافتراضي النظيف تماماً كما تحب المنصة ليعطيك اللون الأخضر
      - build/app/outputs/flutter-apk/app-release.apk
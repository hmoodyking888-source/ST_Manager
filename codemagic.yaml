workflows:
  android-workflow:
    name: Android Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Clean and Get Packages
        script: |
          flutter clean
          flutter pub get
      - name: Build and Hard Capture APK
        script: |
          #!/bin/sh
          # 1. بناء نسخة الـ Release الصافية وتخطي أي مشاكل أيقونات
          flutter build apk --release --no-tree-shake-icons || true

          # 2. إعداد مجلد المخرجات المضمون سحابياً
          EXPORT_DIR=${CM_EXPORT_DIR:-$FCI_EXPORT_DIR}

          echo "--- STARTING DEEP SEARCH FOR THE APK ---"
          
          # 3. خطة بحث ثلاثية الأبعاد لا تترك زاوية في السيرفر إلا وتفتشها
          find build/app/outputs/flutter-apk -name "*.apk" -exec cp {} $EXPORT_DIR/ST_Manager.apk \; || true
          find build -name "*.apk" -exec cp {} $EXPORT_DIR/ST_Manager.apk \; || true
          find . -name "*.apk" -exec cp {} $EXPORT_DIR/ST_Manager.apk \; || true

          # 4. طباعة النتيجة والتأكيد في السجل مباشرة
          if [ -f $EXPORT_DIR/ST_Manager.apk ]; then
            echo "✅ SUCCESS: ST_Manager.apk has been captured and forced into Artifacts!"
            ls -lh $EXPORT_DIR/ST_Manager.apk
          else
            echo "❌ CRITICAL: Searching entire machine..."
            find /Users/builder/clone -name "*.apk" -exec cp {} $EXPORT_DIR/ST_Manager.apk \; 2>/dev/null || true
          fi
    artifacts:
      # اقتناص الملف فوراً من مجلد التصدير السحابي المضمون
      - $CM_EXPORT_DIR/*.apk
      - $FCI_EXPORT_DIR/*.apk
name: st_manager
description: ST_Manager - MikroTik Manager with Firebase & Telegram
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  routeros_api: ^0.1.4
  

  cupertino_icons: ^1.0.6

  # واجهة
  google_fonts: ^6.2.1

  

  # أمان وتخزين
  flutter_secure_storage: ^10.2.0

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12

  # HTTP (لتليجرام وغيره)
  http: ^1.6.0

  # عداد السرعة (Gauge)
  syncfusion_flutter_gauges: ^33.2.6

  # تنسيق تواريخ
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo/